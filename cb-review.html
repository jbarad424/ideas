<title>CB2 Image Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.header{padding:1rem;text-align:center;width:100%}
.header h1{font-size:1.1rem;color:#a855f7;margin-bottom:.2rem}
.header .sub{font-size:.75rem;color:#666}
.tabs{display:flex;gap:0;width:100%;max-width:600px;margin:.5rem auto 0;padding:0 .5rem}
.tab{flex:1;padding:.6rem;text-align:center;font-size:.8rem;font-weight:700;cursor:pointer;border:2px solid #222;transition:all .15s;border-radius:0}
.tab:first-child{border-radius:8px 0 0 8px}
.tab:last-child{border-radius:0 8px 8px 0}
.tab.active-new{background:#1a1030;border-color:#a855f7;color:#a855f7}
.tab.active-done{background:#0a1a0a;border-color:#22c55e;color:#22c55e}
.tab:not([class*="active-"]){background:#111;color:#666}
.counter{font-size:.8rem;color:#888;margin:.5rem 0;padding:0 .5rem;text-align:center}
.img-wrap{width:100%;max-width:600px;background:#111;border-radius:12px;overflow:hidden;margin:0 auto}
.img-wrap img{width:100%;display:block}
.meta{padding:.5rem .8rem;display:flex;gap:.4rem;flex-wrap:wrap}
.tag{font-size:.6rem;padding:.15rem .4rem;border-radius:4px;font-weight:600;background:#1a1030;color:#a855f7;border:1px solid #2d1a4e}
.tag.model{background:#0a1a1a;color:#06b6d4;border-color:#0d2a2a}
/* Context box - shows why this image was generated */
.context-box{width:100%;max-width:600px;margin:.5rem auto;padding:0 .5rem}
.context-inner{background:#0d1117;border:1px solid #1a3a2a;border-radius:8px;padding:.6rem .8rem;font-size:.75rem;line-height:1.5;color:#8b949e}
.context-inner strong{color:#22c55e;font-size:.7rem;display:block;margin-bottom:.3rem}
/* Comment trail */
.comment-trail{width:100%;max-width:600px;margin:.3rem auto;padding:0 .5rem}
.comment-entry{background:#111;border:1px solid #222;border-radius:8px;padding:.5rem .7rem;margin-bottom:.4rem;font-size:.8rem;line-height:1.4}
.comment-entry .comment-time{font-size:.6rem;color:#666;margin-bottom:.2rem}
.comment-entry .comment-text{color:#ccc}
/* Input area */
.feedback-area{width:100%;max-width:600px;margin:.5rem auto;padding:0 .5rem}
.feedback-area textarea{width:100%;min-height:80px;background:#111;border:2px solid #222;border-radius:10px;color:#fff;font-size:.95rem;padding:.8rem;resize:vertical;font-family:inherit;line-height:1.5}
.feedback-area textarea:focus{outline:none;border-color:#a855f7}
.feedback-area textarea::placeholder{color:#555}
.submit-row{display:flex;gap:.5rem;margin-top:.4rem}
.submit-btn{flex:1;background:#a855f7;border:none;color:#fff;padding:.6rem;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer}
.submit-btn:hover{background:#9333ea}
.submit-btn:disabled{opacity:.4;cursor:default}
.nav{display:flex;gap:.5rem;padding:.5rem;justify-content:center;align-items:center;width:100%;max-width:600px}
.nav button{background:#1a1a2e;border:2px solid #333;color:#fff;padding:.5rem .8rem;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;flex:1;max-width:100px}
.nav button:hover{border-color:#a855f7;background:#1a1030}
.nav button:disabled{opacity:.3;cursor:default}
.empty-state{text-align:center;padding:3rem 1rem;color:#555;font-size:.9rem}
.btn-row{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;padding-bottom:2rem}
.export-btn{background:none;border:1px solid #333;color:#888;padding:.4rem .8rem;border-radius:8px;font-size:.7rem;cursor:pointer}
.export-btn:hover{border-color:#a855f7;color:#a855f7}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;padding:.5rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}

<div class="header">
  <h1>CB2 Creative Lab</h1>
  <div class="sub">Review. Dictate. Iterate.</div>
</div>

<div class="tabs">
  <div class="tab" id="tabNew" onclick="switchTab('new')">TO REVIEW (<span id="newCount">0</span>)</div>
  <div class="tab" id="tabDone" onclick="switchTab('done')">REVIEWED (<span id="doneCount">0</span>)</div>
</div>

<div class="counter" id="counter">-</div>

<div id="contentArea">
  <div class="img-wrap" id="imgWrap">
    <img id="mainImg" src="" alt="Loading...">
    <div class="meta" id="meta"></div>
  </div>

  <!-- Context: why this image was generated -->
  <div class="context-box" id="contextBox" style="display:none">
    <div class="context-inner" id="contextInner"></div>
  </div>

  <!-- Previous comments trail -->
  <div class="comment-trail" id="commentTrail"></div>

  <!-- New comment input -->
  <div class="feedback-area">
    <textarea id="feedback" placeholder="Tap the mic and say what you see..."></textarea>
    <div class="submit-row">
      <button class="submit-btn" id="submitBtn" onclick="submitComment()">Submit Comment</button>
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn" onclick="go(-1)">&#8592; Prev</button>
    <button id="nextBtn" onclick="go(1)">Next &#8594;</button>
  </div>
</div>

<div id="emptyState" class="empty-state" style="display:none"></div>

<div class="btn-row">
  <button class="export-btn" onclick="syncFeedback()">Sync All to Claude</button>
  <button class="export-btn" onclick="exportAll()">Copy to Clipboard</button>
</div>

<div class="toast" id="toast"></div>

// === FEEDBACK SYSTEM: Comment trail + sync ===
const LS_KEY = 'cb2_review_v2';
let currentTab = 'new';
let filtered = [];
let ci = 0;

function getData() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
}
function saveData(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }

function getComments(imgId) {
  const d = getData();
  return d[imgId]?.comments || [];
}

function isReviewed(img) {
  return getComments(img.id).length > 0;
}

function submitComment() {
  const text = document.getElementById('feedback').value.trim();
  if (!text) return;
  const img = filtered[ci];
  if (!img) return;

  const d = getData();
  if (!d[img.id]) d[img.id] = { comments: [], label: img.label };
  d[img.id].comments.push({
    text,
    time: new Date().toISOString(),
    num: d[img.id].comments.length + 1
  });
  d[img.id].label = img.label;
  saveData(d);

  // Clear textarea for next comment
  document.getElementById('feedback').value = '';
  document.getElementById('feedback').placeholder = 'Add another comment...';

  updateCounts();
  renderCurrent();
  showToast('Comment #' + d[img.id].comments.length + ' saved');
}

function updateCounts() {
  document.getElementById('newCount').textContent = ALL_IMAGES.filter(i => !isReviewed(i)).length;
  document.getElementById('doneCount').textContent = ALL_IMAGES.filter(i => isReviewed(i)).length;
}

function switchTab(tab) {
  currentTab = tab;
  ci = 0;
  updateFiltered();
  updateTabStyles();
  renderCurrent();
}

function updateFiltered() {
  filtered = currentTab === 'new'
    ? ALL_IMAGES.filter(i => !isReviewed(i))
    : ALL_IMAGES.filter(i => isReviewed(i));
}

function updateTabStyles() {
  document.getElementById('tabNew').className = 'tab' + (currentTab === 'new' ? ' active-new' : '');
  document.getElementById('tabDone').className = 'tab' + (currentTab === 'done' ? ' active-done' : '');
}

function renderCurrent() {
  if (filtered.length === 0) {
    document.getElementById('contentArea').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('emptyState').textContent = currentTab === 'new'
      ? 'All images reviewed! Switch to REVIEWED tab.'
      : 'No reviewed images yet.';
    document.getElementById('counter').textContent = '0 / 0';
    return;
  }
  document.getElementById('contentArea').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  const img = filtered[ci];
  document.getElementById('mainImg').src = img.url;

  const badge = currentTab === 'done'
    ? '<span style="background:#22c55e;color:#000;padding:2px 6px;border-radius:4px;font-size:.6rem;font-weight:700">REVIEWED</span>'
    : '<span style="background:#a855f7;color:#fff;padding:2px 6px;border-radius:4px;font-size:.6rem;font-weight:700">NEW</span>';
  document.getElementById('counter').innerHTML = (ci+1) + ' / ' + filtered.length + ' — ' + img.label + ' ' + badge;

  document.getElementById('meta').innerHTML =
    '<span class="tag model">' + img.model + '</span>' +
    '<span class="tag">' + img.prompt.slice(0,80) + '...</span>';

  // Context box
  const ctxBox = document.getElementById('contextBox');
  const ctxInner = document.getElementById('contextInner');
  if (img.context) {
    ctxBox.style.display = 'block';
    ctxInner.innerHTML = '<strong>WHY THIS IMAGE:</strong>' + img.context;
  } else {
    ctxBox.style.display = 'none';
  }

  // Comment trail
  const trail = document.getElementById('commentTrail');
  const comments = getComments(img.id);
  if (comments.length > 0) {
    trail.innerHTML = comments.map(c => {
      const t = new Date(c.time);
      const timeStr = t.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      return '<div class="comment-entry">' +
        '<div class="comment-time">Comment #' + c.num + ' — ' + timeStr + '</div>' +
        '<div class="comment-text">' + c.text + '</div></div>';
    }).join('');
  } else {
    trail.innerHTML = '';
  }

  // Reset textarea
  document.getElementById('feedback').value = '';
  document.getElementById('feedback').placeholder = comments.length > 0
    ? 'Add another comment...'
    : 'Tap the mic and say what you see...';

  document.getElementById('prevBtn').disabled = ci === 0;
  document.getElementById('nextBtn').disabled = ci === filtered.length - 1;
  window.scrollTo(0, 0);
}

function go(dir) {
  const prevId = filtered[ci]?.id;
  updateFiltered();
  if (dir === 1) {
    const still = filtered.findIndex(i => i.id === prevId);
    ci = still === -1 ? Math.min(ci, filtered.length-1) : Math.min(still+1, filtered.length-1);
  } else {
    ci = Math.max(0, ci-1);
  }
  renderCurrent();
}

function syncFeedback() {
  const d = getData();
  const payload = {
    type: 'feedback_sync',
    syncedAt: new Date().toISOString(),
    images: ALL_IMAGES.map(img => ({
      id: img.id, label: img.label, model: img.model, prompt: img.prompt,
      context: img.context || null,
      comments: d[img.id]?.comments || []
    })).filter(i => i.comments.length > 0)
  };

  // POST to webhook
  fetch(SYNC_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(r => {
    if (r.ok) showToast('Synced ' + payload.images.length + ' images to Claude!');
    else showToast('Sync sent (check webhook)');
  }).catch(() => showToast('Sync sent (offline ok)'));

  // Also save as deployable JSON to clipboard
  navigator.clipboard.writeText(JSON.stringify(payload, null, 2))
    .then(() => {})
    .catch(() => {});
}

function exportAll() {
  const d = getData();
  const lines = ALL_IMAGES.map(img => {
    const comments = d[img.id]?.comments || [];
    const fb = comments.map(c => 'Comment #' + c.num + ' (' + new Date(c.time).toLocaleString() + '): ' + c.text).join('\n');
    return '## ' + img.label + '\nModel: ' + img.model + '\nPrompt: ' + img.prompt +
      (img.context ? '\nContext: ' + img.context : '') +
      '\nFeedback:\n' + (fb || '(none)') + '\n';
  }).join('\n');
  navigator.clipboard.writeText(lines).then(() => showToast('Copied all feedback!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});

// Init
updateCounts();
if (ALL_IMAGES.filter(i => !isReviewed(i)).length === 0 && ALL_IMAGES.some(i => isReviewed(i))) {
  currentTab = 'done';
}
updateFiltered();
updateTabStyles();
renderCurrent();
</script>
</body></html>
