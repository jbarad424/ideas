<meta charset="UTF-8">

<title>CB Asset Grid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.top-bar{position:sticky;top:0;z-index:10;background:#0a0a0ae0;backdrop-filter:blur(12px);padding:1rem 1.5rem;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
.top-bar h1{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#ff6b35,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar .count{font-size:0.85rem;color:#888}
.filters{display:flex;gap:0.5rem;flex-wrap:wrap}
.filters button{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:0.4rem 0.8rem;border-radius:8px;font-size:0.75rem;cursor:pointer;transition:all 0.2s}
.filters button.active{border-color:#ff6b35;color:#ff6b35;background:#1a0f0a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px;padding:4px}
@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
.cell{position:relative;aspect-ratio:1;background:#111;overflow:hidden;cursor:pointer;transition:transform 0.15s}
.cell:hover{transform:scale(1.02);z-index:2}
.cell img{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s}
.cell img.loading{opacity:0}
.cell .name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.85));padding:0.5rem 0.4rem 0.3rem;font-size:0.6rem;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity 0.2s}
.cell:hover .name{opacity:1}
.cell .tag{position:absolute;top:6px;right:6px;padding:2px 6px;border-radius:4px;font-size:0.55rem;font-weight:700;text-transform:uppercase;opacity:0.9}
.tag-action{background:#1d4ed8;color:#fff}
.tag-product{background:#7c3aed;color:#fff}
.tag-bad{background:#991b1b;color:#fff}
.lightbox{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.95);flex-direction:column;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:70vh;object-fit:contain;border-radius:8px}
.lightbox .lb-name{color:#aaa;font-size:0.9rem;margin-top:1rem;text-align:center;max-width:80vw}
.lightbox .lb-actions{display:flex;gap:0.75rem;margin-top:1.5rem}
.lightbox .lb-btn{padding:0.7rem 1.5rem;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:transform 0.12s}
.lightbox .lb-btn:active{transform:scale(0.94)}
.lb-bad{background:#1a0a0a;color:#ef4444;border:2px solid #331111}
.lb-action{background:#0a0f1a;color:#3b82f6;border:2px solid #112244}
.lb-product{background:#120a1a;color:#a855f7;border:2px solid #221144}
.lb-close{position:absolute;top:1rem;right:1.5rem;background:none;border:none;color:#666;font-size:2rem;cursor:pointer}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:1.5rem;padding:1rem 0.75rem;cursor:pointer;border-radius:8px}
.lb-nav:hover{background:rgba(255,255,255,0.2)}
.lb-prev{left:1rem}
.lb-next{right:1rem}
</style>
</head>
<body>
<div class="top-bar">
  <div>
    <h1>CB Asset Grid</h1>
    <span class="count" id="countLabel">Loading...</span>
  </div>
  <div class="filters">
    <button class="active" onclick="filterGrid('all')">All</button>
    <button onclick="filterGrid('unrated')">Unrated</button>
    <button onclick="filterGrid('action')">Action</button>
    <button onclick="filterGrid('product')">Product</button>
    <button onclick="filterGrid('bad')">Bad</button>
  </div>
</div>
<div class="grid" id="grid"></div>
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">&times;</button>
  <button class="lb-nav lb-prev" onclick="navLB(-1)">&larr;</button>
  <button class="lb-nav lb-next" onclick="navLB(1)">&rarr;</button>
  <img id="lbImg" src="">
  <div class="lb-name" id="lbName"></div>
  <div class="lb-actions">
    <button class="lb-btn lb-bad" onclick="tagFromLB('bad')">&#x2717; BAD</button>
    <button class="lb-btn lb-action" onclick="tagFromLB('action')">&#x1F3BF; ACTION</button>
    <button class="lb-btn lb-product" onclick="tagFromLB('product')">&#x1F4F7; PRODUCT</button>
  </div>

let ratings=JSON.parse(localStorage.getItem(SK)||'{}');
let currentFilter='all';
let lbIndex=-1;
let filtered=[];
function getUser(){return localStorage.getItem('cb_tagger_name')||'anonymous';}
function render(){
  filtered=ASSETS.filter(a=>{
    const r=ratings[a.f];
    if(currentFilter==='all')return true;
    if(currentFilter==='unrated')return !r;
    return r===currentFilter;
  });
  const ac=Object.values(ratings).filter(r=>r==='action').length;
  const pc=Object.values(ratings).filter(r=>r==='product').length;
  const bc=Object.values(ratings).filter(r=>r==='bad').length;
  const un=ASSETS.length-ac-pc-bc;
  document.getElementById('countLabel').textContent=filtered.length+' shown | '+ac+' action, '+pc+' product, '+bc+' bad, '+un+' unrated';
  const g=document.getElementById('grid');
  g.innerHTML=filtered.map((a,i)=>{
    const r=ratings[a.f];
    const tag=r?'<div class="tag tag-'+r+'">'+r+'</div>':'';
    return '<div class="cell" onclick="openLB('+i+')"><img src="https://drive.google.com/thumbnail?id='+a.f+'&sz=w300" loading="lazy" onload="this.classList.remove(\'loading\')" class="loading" onerror="this.src=\'data:image/svg+xml,<svg xmlns=http://www.w3.org/2000/svg viewBox=0%200%201%201><rect fill=%23222 width=1 height=1/></svg>\'">'+tag+'<div class="name">'+esc(a.n)+'</div></div>';
  }).join('');
}
function filterGrid(f){
  currentFilter=f;
  document.querySelectorAll('.filters button').forEach(b=>{b.classList.toggle('active',b.textContent.toLowerCase()===f||(f==='all'&&b.textContent==='All'));});
  render();
}
function openLB(i){
  lbIndex=i;
  const a=filtered[i];
  document.getElementById('lbImg').src='https://drive.google.com/thumbnail?id='+a.f+'&sz=w1200';
  document.getElementById('lbName').textContent=a.n;
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');lbIndex=-1;}
function navLB(d){
  if(lbIndex<0)return;
  lbIndex=(lbIndex+d+filtered.length)%filtered.length;
  openLB(lbIndex);
}
function tagFromLB(r){
  if(lbIndex<0)return;
  const a=filtered[lbIndex];
  ratings[a.f]=r;
  localStorage.setItem(SK,JSON.stringify(ratings));
  fetch(API_RATE,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fileId:a.f,rating:r,ratedBy:getUser(),ratedAt:new Date().toISOString()})
  }).catch(()=>{});
  navLB(1);
  render();
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  else if(e.key==='ArrowLeft')navLB(-1);
  else if(e.key==='ArrowRight')navLB(1);
  else if(e.key==='1')tagFromLB('bad');
  else if(e.key==='2')tagFromLB('action');
  else if(e.key==='3')tagFromLB('product');
});
render();
