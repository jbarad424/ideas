<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Asset Tagger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.top-bar{position:sticky;top:0;z-index:10;background:#0a0a0ae0;backdrop-filter:blur(12px);padding:0.75rem 1rem;border-bottom:1px solid #1a1a1a}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap}
.top-bar h1{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#ff6b35,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar .count{font-size:0.8rem;color:#888}
.name-bar{display:flex;gap:0.5rem;align-items:center;margin-top:0.5rem}
.name-bar input{background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;padding:0.35rem 0.6rem;font-size:0.8rem;width:120px;outline:none}
.name-bar input:focus{border-color:#ff6b35}
.name-bar .sync-btn{background:#1a1a1a;border:1px solid #333;color:#888;padding:0.35rem 0.7rem;border-radius:8px;font-size:0.7rem;cursor:pointer}
.name-bar .sync-btn:hover{border-color:#ff6b35;color:#ff6b35}
.filters{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem}
.filters button{background:#1a1a1a;border:1px solid #222;color:#777;padding:0.3rem 0.6rem;border-radius:6px;font-size:0.7rem;cursor:pointer;transition:all 0.15s}
.filters button.active{border-color:#ff6b35;color:#ff6b35;background:#1a0f0a}
.group-header{padding:0.6rem 0.5rem 0.3rem;font-size:0.75rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid #1a1a1a;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:3px;padding:3px}
@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
.cell{position:relative;aspect-ratio:1;background:#111;overflow:hidden;cursor:pointer;transition:transform 0.15s}
.cell:hover{transform:scale(1.03);z-index:2}
.cell img{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s}
.cell img.loading{opacity:0}
.cell .name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.85));padding:0.4rem 0.3rem 0.25rem;font-size:0.55rem;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity 0.2s}
.cell:hover .name{opacity:1}
.cell .tag{position:absolute;top:4px;right:4px;padding:2px 5px;border-radius:4px;font-size:0.5rem;font-weight:700;text-transform:uppercase}
.tag-action{background:#1d4ed8;color:#fff}
.tag-product{background:#7c3aed;color:#fff}
.tag-bad{background:#991b1b;color:#fff}
.lightbox{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.95);flex-direction:column;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:65vh;object-fit:contain;border-radius:8px}
.lb-info{color:#aaa;font-size:0.85rem;margin-top:0.75rem;text-align:center;max-width:80vw}
.lb-info .lb-group{font-size:0.65rem;color:#555;margin-top:0.2rem}
.lb-actions{display:flex;gap:0.6rem;margin-top:1rem}
.lb-btn{padding:0.6rem 1.2rem;border:none;border-radius:10px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:transform 0.12s}
.lb-btn:active{transform:scale(0.94)}
.lb-bad{background:#1a0a0a;color:#ef4444;border:2px solid #331111}
.lb-action{background:#0a0f1a;color:#3b82f6;border:2px solid #112244}
.lb-product{background:#120a1a;color:#a855f7;border:2px solid #221144}
.lb-close{position:absolute;top:0.75rem;right:1rem;background:none;border:none;color:#555;font-size:1.8rem;cursor:pointer}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:1.3rem;padding:0.8rem 0.6rem;cursor:pointer;border-radius:8px}
.lb-nav:hover{background:rgba(255,255,255,0.15)}
.lb-prev{left:0.75rem}
.lb-next{right:0.75rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#113311;color:#22c55e;padding:0.6rem 1.2rem;border-radius:10px;font-size:0.8rem;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-row">
    <div><h1>CB Asset Tagger</h1></div>
    <span class="count" id="countLabel">Loading...</span>
  </div>
  <div class="name-bar">
    <input type="text" id="nameInput" placeholder="Your name" value="">
    <button class="sync-btn" onclick="syncRatings()">Sync Ratings</button>
  </div>
  <div class="filters">
    <button class="active" onclick="setFilter('all')">All</button>
    <button onclick="setFilter('unrated')">Unrated</button>
    <button onclick="setFilter('action')">Action</button>
    <button onclick="setFilter('product')">Product</button>
    <button onclick="setFilter('bad')">Bad</button>
    <button onclick="setFilter('group')">By Folder</button>
  </div>
</div>
<div id="content"></div>
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">&times;</button>
  <button class="lb-nav lb-prev" onclick="navLB(-1)">&larr;</button>
  <button class="lb-nav lb-next" onclick="navLB(1)">&rarr;</button>
  <img id="lbImg" src="">
  <div class="lb-info"><span id="lbName"></span><div class="lb-group" id="lbGroup"></div></div>
  <div class="lb-actions">
    <button class="lb-btn lb-bad" onclick="tagLB('bad')">&#x2717; BAD</button>
    <button class="lb-btn lb-action" onclick="tagLB('action')">ACTION</button>
    <button class="lb-btn lb-product" onclick="tagLB('product')">PRODUCT</button>
  </div>
</div>
<div class="toast" id="toast"></div>

let R={},filter='all',lbIdx=-1,filtered=[];
const ni=document.getElementById('nameInput');
ni.value=localStorage.getItem('cb_tagger_name')||'';
ni.addEventListener('change',()=>localStorage.setItem('cb_tagger_name',ni.value.trim()));
// Load shared ratings on start
(async function(){
  try{
    const res=await fetch(RATINGS_URL+'?t='+Date.now());
    const shared=await res.json();
    // Merge: shared ratings are base, localStorage overrides
    const local=JSON.parse(localStorage.getItem(SK)||'{}');
    R={...shared,...local};
    localStorage.setItem(SK,JSON.stringify(R));
  }catch(e){R=JSON.parse(localStorage.getItem(SK)||'{}');}
  render();
})();
function getGroups(){
  const groups={};
  A.forEach(a=>{if(!groups[a.g])groups[a.g]=[];groups[a.g].push(a);});
  return groups;
}
function render(){
  const ac=Object.values(R).filter(r=>r==='action').length;
  const pc=Object.values(R).filter(r=>r==='product').length;
  const bc=Object.values(R).filter(r=>r==='bad').length;
  const un=A.length-ac-pc-bc;
  filtered=A.filter(a=>{
    const r=R[a.f];
    if(filter==='all')return true;
    if(filter==='unrated')return !r;
    if(filter==='group')return true;
    return r===filter;
  });
  document.getElementById('countLabel').textContent=filtered.length+' shown | '+ac+' action, '+pc+' product, '+bc+' bad, '+un+' unrated';
  const c=document.getElementById('content');
  if(filter==='group'){
    const groups=getGroups();
    let html='';
    for(const[gname,items]of Object.entries(groups)){
      const vis=items.filter(a=>{const r=R[a.f];return true;});
      html+='<div class="group-header">'+esc(gname)+' ('+vis.length+')</div>';
      html+='<div class="grid">'+vis.map((a,i)=>cell(a,A.indexOf(a))).join('')+'</div>';
    }
    c.innerHTML=html;
  }else{
    c.innerHTML='<div class="grid">'+filtered.map((a,i)=>cell(a,i)).join('')+'</div>';
  }
}
function cell(a,i){
  const r=R[a.f];
  const tag=r?'<div class="tag tag-'+r+'">'+r+'</div>':'';
  return '<div class="cell" onclick="openLB(\''+a.f+'\')"><img src="https://drive.google.com/thumbnail?id='+a.f+'&sz=w300" loading="lazy" onload="this.classList.remove(\'loading\')" class="loading" onerror="this.style.display=\'none\'">'+tag+'<div class="name">'+esc(a.n)+'</div></div>';
}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}
function openLB(fid){
  const idx=filtered.findIndex(a=>a.f===fid);
  if(idx<0){lbIdx=A.findIndex(a=>a.f===fid);filtered=A;}
  else lbIdx=idx;
  showLB();
}
function showLB(){
  const a=filtered[lbIdx];
  if(!a)return;
  document.getElementById('lbImg').src='https://drive.google.com/thumbnail?id='+a.f+'&sz=w1200';
  document.getElementById('lbName').textContent=a.n;
  document.getElementById('lbGroup').textContent=a.g||'';
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');lbIdx=-1;}
function navLB(d){
  if(lbIdx<0)return;
  lbIdx=(lbIdx+d+filtered.length)%filtered.length;
  showLB();
}
function tagLB(r){
  if(lbIdx<0)return;
  const a=filtered[lbIdx];
  R[a.f]=r;
  localStorage.setItem(SK,JSON.stringify(R));
  const who=ni.value.trim()||'anon';
  fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileId:a.f,rating:r,ratedBy:who,ratedAt:new Date().toISOString()})}).catch(()=>{});
  navLB(1);render();
}
function syncRatings(){
  const t=document.getElementById('toast');
  t.textContent='Syncing ratings...';t.classList.add('show');
  fetch(RATINGS_URL+'?t='+Date.now()).then(r=>r.json()).then(shared=>{
    const local=JSON.parse(localStorage.getItem(SK)||'{}');
    R={...shared,...local};
    localStorage.setItem(SK,JSON.stringify(R));
    render();
    t.textContent='Synced! '+Object.keys(R).length+' ratings loaded';
    setTimeout(()=>t.classList.remove('show'),2000);
  }).catch(()=>{t.textContent='Sync failed';setTimeout(()=>t.classList.remove('show'),2000);});
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  else if(e.key==='ArrowLeft')navLB(-1);
  else if(e.key==='ArrowRight')navLB(1);
  else if(e.key==='1')tagLB('bad');
  else if(e.key==='2')tagLB('action');
  else if(e.key==='3')tagLB('product');
});
</script>
