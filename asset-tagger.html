<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CB Asset Tagger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden}
#onboarding{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
#onboarding h1{font-size:2rem;font-weight:800;margin-bottom:0.5rem;background:linear-gradient(135deg,#ff6b35,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#onboarding p{color:#888;margin-bottom:2rem;font-size:0.95rem;max-width:340px;line-height:1.5}
#onboarding input{background:#1a1a1a;border:2px solid #333;border-radius:12px;color:#fff;font-size:1.1rem;padding:1rem 1.5rem;width:100%;max-width:320px;text-align:center;outline:none;transition:border-color 0.2s}
#onboarding input:focus{border-color:#ff6b35}
#onboarding button{margin-top:1.5rem;background:linear-gradient(135deg,#ff6b35,#e85d2a);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;padding:1rem 3rem;cursor:pointer;transition:transform 0.15s,opacity 0.15s}
#onboarding button:active{transform:scale(0.96)}
#onboarding button:disabled{opacity:0.4;cursor:not-allowed}
#app{display:none;flex-direction:column;min-height:100vh}
.header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a1a1a}
.header-left h2{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#ff6b35,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-left span{font-size:0.75rem;color:#666}
.stats{display:flex;gap:0.75rem;font-size:0.8rem}
.stat{text-align:center}
.stat-num{font-weight:800;font-size:1rem}
.stat-label{color:#666;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px}
.stat-action .stat-num{color:#3b82f6}
.stat-product .stat-num{color:#a855f7}
.stat-bad .stat-num{color:#ef4444}
.stat-left .stat-num{color:#888}
.progress-wrap{padding:0 1.25rem;padding-top:0.75rem}
.progress-bar{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff6b35,#f7c948);border-radius:3px;transition:width 0.4s ease}
.progress-text{text-align:center;font-size:0.75rem;color:#666;margin-top:0.35rem}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden}
.card{width:100%;max-width:500px;background:#141414;border-radius:16px;overflow:hidden;position:relative;transition:transform 0.3s ease,opacity 0.3s ease}
.card.swipe-left{transform:translateX(-120%) rotate(-15deg);opacity:0}
.card.swipe-right{transform:translateX(120%) rotate(15deg);opacity:0}
.card.swipe-up{transform:translateY(-120%);opacity:0}
.card-image-wrap{width:100%;aspect-ratio:4/3;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-image-wrap img{width:100%;height:100%;object-fit:contain}
.card-image-wrap .placeholder{color:#333;font-size:3rem}
.card-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.5rem;font-weight:900;opacity:0;transition:opacity 0.2s;pointer-events:none;text-shadow:0 2px 20px rgba(0,0,0,0.5);text-align:center;line-height:1.2}
.card-overlay.show-action{opacity:1;color:#3b82f6}
.card-overlay.show-product{opacity:1;color:#a855f7}
.card-overlay.show-bad{opacity:1;color:#ef4444}
.card-info{padding:1rem 1.25rem}
.card-info h3{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info .card-meta{font-size:0.75rem;color:#666;margin-top:0.25rem}
.actions{padding:0.75rem 1rem 1.5rem;display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap}
.btn{padding:0.85rem 1rem;border:none;border-radius:14px;font-size:0.95rem;font-weight:800;cursor:pointer;transition:transform 0.12s,box-shadow 0.12s;display:flex;align-items:center;justify-content:center;gap:0.4rem;min-width:0;flex:1}
.btn:active{transform:scale(0.94)}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-bad{background:#1a0a0a;color:#ef4444;border:2px solid #331111;max-width:100px}
.btn-bad:hover:not(:disabled){background:#2a0f0f;box-shadow:0 0 20px rgba(239,68,68,0.15)}
.btn-action{background:#0a0f1a;color:#3b82f6;border:2px solid #112244}
.btn-action:hover:not(:disabled){background:#0f1a2f;box-shadow:0 0 20px rgba(59,130,246,0.15)}
.btn-product{background:#120a1a;color:#a855f7;border:2px solid #221144}
.btn-product:hover:not(:disabled){background:#1a0f2a;box-shadow:0 0 20px rgba(168,85,247,0.15)}
.btn-skip{flex:0;min-width:55px;max-width:55px;background:#1a1a1a;color:#666;border:2px solid #222;font-size:0.75rem;padding:0.7rem 0.5rem}
.keyboard-hints{text-align:center;padding-bottom:0.75rem;font-size:0.65rem;color:#444}
.keyboard-hints kbd{background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:2px 5px;font-family:inherit;font-size:0.6rem}
#done{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:2rem;text-align:center}
#done h2{font-size:2rem;font-weight:800;margin-bottom:1rem}
#done .done-stats{display:flex;gap:2rem;margin:1.5rem 0}
#done .done-stat{text-align:center}
#done .done-stat-num{font-size:2.5rem;font-weight:900}
#done .done-stat-label{font-size:0.8rem;color:#666;text-transform:uppercase}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#aaa;padding:0.75rem 1.5rem;border-radius:12px;font-size:0.85rem;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="onboarding">
  <h1>CB Asset Tagger</h1>
  <p>Rate Chubby Buttons images from Google Drive. Tag them as Action shots, Product shots, or skip.</p>
  <input type="text" id="userName" placeholder="Enter your name" autocomplete="off">
  <button id="startBtn" onclick="startApp()" disabled>Let's Go</button>
</div>
<div id="app">
  <div class="header">
    <div class="header-left">
      <h2>CB Asset Tagger</h2>
      <span id="userLabel"></span>
    </div>
    <div class="stats">
      <div class="stat stat-action"><div class="stat-num" id="actionCount">0</div><div class="stat-label">Action</div></div>
      <div class="stat stat-product"><div class="stat-num" id="productCount">0</div><div class="stat-label">Product</div></div>
      <div class="stat stat-bad"><div class="stat-num" id="badCount">0</div><div class="stat-label">Bad</div></div>
      <div class="stat stat-left"><div class="stat-num" id="leftCount">0</div><div class="stat-label">Left</div></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">Loading...</div>
  </div>
  <div class="card-area" id="cardArea"></div>
  <div class="actions" id="actions" style="display:none">
    <button class="btn btn-bad" id="btnBad" onclick="rate('bad')">&#x2717; BAD</button>
    <button class="btn btn-action" id="btnAction" onclick="rate('action')">&#x1F3BF; ACTION</button>
    <button class="btn btn-product" id="btnProduct" onclick="rate('product')">&#x1F4F7; PRODUCT</button>
    <button class="btn btn-skip" onclick="skip()">SKIP</button>
  </div>
  <div class="keyboard-hints" id="keyHints" style="display:none">
    <kbd>&larr;</kbd> Bad &middot; <kbd>&uarr;</kbd> Action &middot; <kbd>&rarr;</kbd> Product &middot; <kbd>&darr;</kbd> Skip
  </div>
</div>
<div id="done">
  <h2>All Done!</h2>
  <p style="color:#888">You've rated every image in this batch.</p>
  <div class="done-stats">
    <div class="done-stat"><div class="done-stat-num" style="color:#3b82f6" id="finalAction">0</div><div class="done-stat-label">Action</div></div>
    <div class="done-stat"><div class="done-stat-num" style="color:#a855f7" id="finalProduct">0</div><div class="done-stat-label">Product</div></div>
    <div class="done-stat"><div class="done-stat-num" style="color:#ef4444" id="finalBad">0</div><div class="done-stat-label">Bad</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

ni.addEventListener('input',()=>{sb.disabled=!ni.value.trim();});
ni.addEventListener('keydown',e=>{if(e.key==='Enter'&&ni.value.trim())startApp();});
function startApp(){
  userName=ni.value.trim();if(!userName)return;
  localStorage.setItem('cb_tagger_name',userName);
  ratings=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  actionCount=Object.values(ratings).filter(r=>r==='action').length;
  productCount=Object.values(ratings).filter(r=>r==='product').length;
  badCount=Object.values(ratings).filter(r=>r==='bad').length;
  ci=ASSETS.findIndex(a=>!ratings[a.f]);
  if(ci===-1)ci=ASSETS.length;
  document.getElementById('onboarding').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('userLabel').textContent=userName;
  document.getElementById('actions').style.display='flex';
  document.getElementById('keyHints').style.display='block';
  updateStats();showCard();
}
function updateStats(){
  const total=ASSETS.length,rated=actionCount+productCount+badCount,pct=total?Math.round(rated/total*100):0;

  document.getElementById('productCount').textContent=productCount;
  document.getElementById('badCount').textContent=badCount;
  document.getElementById('leftCount').textContent=total-rated;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=rated+' of '+total+' rated ('+pct+'%)';
}
function showCard(){

  if(ci>=ASSETS.length){showDone();return;}
  const a=ASSETS[ci];
  const thumb='https://drive.google.com/thumbnail?id='+a.f+'&sz=w800';
  const url='https://drive.google.com/file/d/'+a.f+'/view';
  document.getElementById('cardArea').innerHTML=
    '<div class="card" id="card">'+
    '<div class="card-image-wrap"><img src="'+thumb+'" alt="'+esc(a.n)+'" onerror="this.parentElement.innerHTML=\'<div class=placeholder>&#x1f5bc;</div>\'"></div>'+
    '<div class="card-overlay" id="overlay"></div>'+
    '<div class="card-info"><h3>'+esc(a.n)+'</h3>'+
    '<div class="card-meta"><a href="'+url+'" target="_blank" rel="noopener" style="color:#ff6b35;text-decoration:none">Open in Drive &rarr;</a></div></div></div>';
  ['btnBad','btnAction','btnProduct'].forEach(id=>{document.getElementById(id).disabled=false;});
}

  const a=ASSETS[ci],card=document.getElementById('card'),ov=document.getElementById('overlay');
  const labels={action:'ACTION',product:'PRODUCT',bad:'NOPE'};
  ov.textContent=labels[r];
  ov.className='card-overlay show-'+r;
  ['btnBad','btnAction','btnProduct'].forEach(id=>{document.getElementById(id).disabled=true;});
  const anim={bad:'swipe-left',action:'swipe-up',product:'swipe-right'};
  setTimeout(()=>{card.classList.add(anim[r]);},200);
  ratings[a.f]=r;localStorage.setItem(STORAGE_KEY,JSON.stringify(ratings));
  if(r==='action')actionCount++;else if(r==='product')productCount++;else badCount++;
  updateStats();
  fetch(API_RATE,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fileId:a.f,rating:r,ratedBy:userName,ratedAt:new Date().toISOString()})
  }).catch(()=>{});
  setTimeout(()=>{ci++;showCard();isRating=false;},450);
}
function skip(){
  if(isRating||ci>=ASSETS.length)return;isRating=true;
  const card=document.getElementById('card');
  if(card){card.style.transition='transform 0.3s,opacity 0.3s';card.style.transform='scale(0.8)';card.style.opacity='0';}
  setTimeout(()=>{ci++;showCard();isRating=false;},300);
}
function showDone(){
  document.getElementById('app').style.display='none';
  document.getElementById('done').style.display='flex';
  document.getElementById('finalAction').textContent=actionCount;
  document.getElementById('finalProduct').textContent=productCount;
  document.getElementById('finalBad').textContent=badCount;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
document.addEventListener('keydown',e=>{
  if(document.getElementById('app').style.display!=='flex')return;
  if(e.key==='ArrowLeft')rate('bad');
  else if(e.key==='ArrowUp')rate('action');
  else if(e.key==='ArrowRight')rate('product');
  else if(e.key==='ArrowDown')skip();
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(document.getElementById('app').style.display!=='flex')return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<50&&ay<50)return;
  if(ay>ax&&dy<0){rate('action');return;}
  if(ax>ay){dx>0?rate('product'):rate('bad');}
},{passive:true});
</script>
