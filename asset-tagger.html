<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CB Asset Tagger</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a; color: #fff; min-height: 100vh; overflow-x: hidden;
  }
  #onboarding {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; text-align: center;
  }
  #onboarding h1 {
    font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #ff6b35, #f7c948);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #onboarding p { color: #888; margin-bottom: 2rem; font-size: 0.95rem; }
  #onboarding input {
    background: #1a1a1a; border: 2px solid #333; border-radius: 12px; color: #fff;
    font-size: 1.1rem; padding: 1rem 1.5rem; width: 100%; max-width: 320px;
    text-align: center; outline: none; transition: border-color 0.2s;
  }
  #onboarding input:focus { border-color: #ff6b35; }
  #onboarding button {
    margin-top: 1.5rem; background: linear-gradient(135deg, #ff6b35, #e85d2a);
    color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700;
    padding: 1rem 3rem; cursor: pointer; transition: transform 0.15s, opacity 0.15s;
  }
  #onboarding button:active { transform: scale(0.96); }
  #onboarding button:disabled { opacity: 0.4; cursor: not-allowed; }
  #app { display: none; flex-direction: column; min-height: 100vh; }
  .header {
    padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #1a1a1a;
  }
  .header-left h2 {
    font-size: 1rem; font-weight: 700;
    background: linear-gradient(135deg, #ff6b35, #f7c948);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-left span { font-size: 0.75rem; color: #666; }
  .stats { display: flex; gap: 1rem; font-size: 0.8rem; }
  .stat { text-align: center; }
  .stat-num { font-weight: 800; font-size: 1.1rem; }
  .stat-label { color: #666; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-good .stat-num { color: #22c55e; }
  .stat-bad .stat-num { color: #ef4444; }
  .stat-left .stat-num { color: #888; }
  .progress-wrap { padding: 0 1.25rem; padding-top: 0.75rem; }
  .progress-bar { height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #ff6b35, #f7c948);
    border-radius: 3px; transition: width 0.4s ease;
  }
  .progress-text { text-align: center; font-size: 0.75rem; color: #666; margin-top: 0.35rem; }
  .card-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 1rem; position: relative; overflow: hidden;
  }
  .card {
    width: 100%; max-width: 500px; background: #141414; border-radius: 16px;
    overflow: hidden; position: relative; transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .card.swipe-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
  .card.swipe-right { transform: translateX(120%) rotate(15deg); opacity: 0; }
  .card-image-wrap {
    width: 100%; aspect-ratio: 4/3; background: #0a0a0a;
    display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
  }
  .card-image-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .card-image-wrap .placeholder { color: #333; font-size: 3rem; }
  .card-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 5rem; font-weight: 900; opacity: 0; transition: opacity 0.2s;
    pointer-events: none; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .card-overlay.show-good { opacity: 1; color: #22c55e; }
  .card-overlay.show-bad { opacity: 1; color: #ef4444; }
  .card-info { padding: 1rem 1.25rem; }
  .card-info h3 {
    font-size: 0.9rem; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .card-info .card-meta { font-size: 0.75rem; color: #666; margin-top: 0.25rem; }
  .actions { padding: 1rem 1.25rem 2rem; display: flex; gap: 1rem; justify-content: center; }
  .btn {
    flex: 1; max-width: 200px; padding: 1rem; border: none; border-radius: 16px;
    font-size: 1.1rem; font-weight: 800; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn:active { transform: scale(0.94); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-bad { background: #1a0a0a; color: #ef4444; border: 2px solid #331111; }
  .btn-bad:hover:not(:disabled) { background: #2a0f0f; box-shadow: 0 0 30px rgba(239,68,68,0.15); }
  .btn-good { background: #0a1a0a; color: #22c55e; border: 2px solid #113311; }
  .btn-good:hover:not(:disabled) { background: #0f2a0f; box-shadow: 0 0 30px rgba(34,197,94,0.15); }
  .btn-skip {
    flex: 0; min-width: 60px; background: #1a1a1a; color: #666;
    border: 2px solid #222; font-size: 0.85rem; padding: 0.75rem;
  }
  .keyboard-hints {
    text-align: center; padding-bottom: 0.75rem; font-size: 0.7rem; color: #444;
  }
  .keyboard-hints kbd {
    background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
    padding: 2px 6px; font-family: inherit; font-size: 0.65rem;
  }
  #done {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 80vh; padding: 2rem; text-align: center;
  }
  #done h2 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
  #done .done-stats { display: flex; gap: 2rem; margin: 1.5rem 0; }
  #done .done-stat { text-align: center; }
  #done .done-stat-num { font-size: 2.5rem; font-weight: 900; }
  #done .done-stat-label { font-size: 0.8rem; color: #666; text-transform: uppercase; }
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: #aaa; padding: 0.75rem 1.5rem; border-radius: 12px;
    font-size: 0.85rem; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .badge-video {
    position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7);
    color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600;
  }
</style>
</head>
<body>
<div id="onboarding">
  <h1>CB Asset Tagger</h1>
  <p>Rate your Google Drive assets for the training pool</p>
  <input type="text" id="userName" placeholder="Enter your name" autocomplete="off">
  <button id="startBtn" onclick="startApp()" disabled>Let's Go</button>
</div>
<div id="app">
  <div class="header">
    <div class="header-left">
      <h2>CB Asset Tagger</h2>
      <span id="userLabel"></span>
    </div>
    <div class="stats">
      <div class="stat stat-good"><div class="stat-num" id="goodCount">0</div><div class="stat-label">Good</div></div>
      <div class="stat stat-bad"><div class="stat-num" id="badCount">0</div><div class="stat-label">Bad</div></div>
      <div class="stat stat-left"><div class="stat-num" id="leftCount">0</div><div class="stat-label">Left</div></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">Loading...</div>
  </div>
  <div class="card-area" id="cardArea"></div>
  <div class="actions" id="actions" style="display:none">
    <button class="btn btn-bad" id="btnBad" onclick="rate('bad')"><span style="font-size:1.3rem">&#x2717;</span> BAD</button>
    <button class="btn btn-skip" onclick="skip()">SKIP</button>
    <button class="btn btn-good" id="btnGood" onclick="rate('good')"><span style="font-size:1.3rem">&#x2713;</span> GOOD</button>
  </div>
  <div class="keyboard-hints" id="keyHints" style="display:none">
    <kbd>&larr;</kbd> Bad &middot; <kbd>&rarr;</kbd> Good &middot; <kbd>&darr;</kbd> Skip
  </div>
</div>
<div id="done">
  <h2>All Done!</h2>
  <p style="color:#888">You've rated every asset.</p>
  <div class="done-stats">
    <div class="done-stat"><div class="done-stat-num" style="color:#22c55e" id="finalGood">0</div><div class="done-stat-label">Good</div></div>
    <div class="done-stat"><div class="done-stat-num" style="color:#ef4444" id="finalBad">0</div><div class="done-stat-label">Bad</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

let currentIndex=0,userName='',goodCount=0,badCount=0,isRating=false,ratings={};
const nameInput=document.getElementById('userName'),startBtn=document.getElementById('startBtn');
const saved=localStorage.getItem('cb_tagger_name');
if(saved){nameInput.value=saved;startBtn.disabled=false;}
nameInput.addEventListener('input',()=>{startBtn.disabled=!nameInput.value.trim();});
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&nameInput.value.trim())startApp();});
function startApp(){
  userName=nameInput.value.trim();if(!userName)return;
  localStorage.setItem('cb_tagger_name',userName);
  ratings=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  goodCount=Object.values(ratings).filter(r=>r==='good').length;
  badCount=Object.values(ratings).filter(r=>r==='bad').length;
  currentIndex=ASSETS.findIndex(a=>!ratings[a.f]);
  if(currentIndex===-1)currentIndex=ASSETS.length;
  document.getElementById('onboarding').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('userLabel').textContent=userName;
  document.getElementById('actions').style.display='flex';
  document.getElementById('keyHints').style.display='block';
  updateStats();showCurrentCard();
}
function updateStats(){
  const total=ASSETS.length,rated=goodCount+badCount,pct=total?Math.round(rated/total*100):0;
  document.getElementById('goodCount').textContent=goodCount;
  document.getElementById('badCount').textContent=badCount;
  document.getElementById('leftCount').textContent=total-rated;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=rated+' of '+total+' rated ('+pct+'%)';
}
function showCurrentCard(){
  while(currentIndex<ASSETS.length&&ratings[ASSETS[currentIndex].f])currentIndex++;
  if(currentIndex>=ASSETS.length){showDone();return;}
  const a=ASSETS[currentIndex],isV=a.t&&a.t.startsWith('video/');
  const thumb='https://drive.google.com/thumbnail?id='+a.f+'&sz=w800';
  const driveUrl='https://drive.google.com/file/d/'+a.f+'/view';
  document.getElementById('cardArea').innerHTML=
    '<div class="card" id="currentCard">'+
    '<div class="card-image-wrap"><img src="'+thumb+'" alt="'+esc(a.n)+'" onerror="this.parentElement.innerHTML=\'<div class=placeholder>'+(isV?'&#x1f3ac;':'&#x1f5bc;')+'</div>\'">'+
    (isV?'<div class="badge-video">VIDEO</div>':'')+
    '</div><div class="card-overlay" id="cardOverlay"></div>'+
    '<div class="card-info"><h3>'+esc(a.n)+'</h3>'+
    '<div class="card-meta"><a href="'+driveUrl+'" target="_blank" rel="noopener" style="color:#ff6b35;text-decoration:none">Open in Drive &rarr;</a></div></div></div>';
  document.getElementById('btnBad').disabled=false;
  document.getElementById('btnGood').disabled=false;
}
function rate(r){
  if(isRating||currentIndex>=ASSETS.length)return;isRating=true;
  const a=ASSETS[currentIndex],card=document.getElementById('currentCard'),ov=document.getElementById('cardOverlay');
  ov.textContent=r==='good'?'GOOD':'NOPE';
  ov.className='card-overlay '+(r==='good'?'show-good':'show-bad');
  document.getElementById('btnBad').disabled=true;document.getElementById('btnGood').disabled=true;
  setTimeout(()=>{card.classList.add(r==='good'?'swipe-right':'swipe-left');},200);
  ratings[a.f]=r;localStorage.setItem(STORAGE_KEY,JSON.stringify(ratings));
  if(r==='good')goodCount++;else badCount++;updateStats();
  fetch(API_RATE,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fileId:a.f,rating:r,ratedBy:userName,ratedAt:new Date().toISOString()})
  }).catch(e=>console.error('Sync failed:',e));
  setTimeout(()=>{currentIndex++;showCurrentCard();isRating=false;},450);
}
function skip(){
  if(isRating||currentIndex>=ASSETS.length)return;isRating=true;
  const card=document.getElementById('currentCard');
  if(card){card.style.transition='transform 0.3s,opacity 0.3s';card.style.transform='translateY(100px)';card.style.opacity='0';}
  setTimeout(()=>{currentIndex++;showCurrentCard();isRating=false;},300);
}
function showDone(){
  document.getElementById('app').style.display='none';
  document.getElementById('done').style.display='flex';
  document.getElementById('finalGood').textContent=goodCount;
  document.getElementById('finalBad').textContent=badCount;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
document.addEventListener('keydown',e=>{
  if(document.getElementById('app').style.display!=='flex')return;
  if(e.key==='ArrowLeft')rate('bad');else if(e.key==='ArrowRight')rate('good');else if(e.key==='ArrowDown')skip();
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(document.getElementById('app').style.display!=='flex')return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx))return;
  dx>0?rate('good'):rate('bad');
},{passive:true});
</script>
