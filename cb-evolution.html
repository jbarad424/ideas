<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Creative Lab: Evolution</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden}
a{color:#a78bfa;text-decoration:none}
a:hover{text-decoration:underline}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1rem}
.loading .spinner{width:40px;height:40px;border:3px solid #222;border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#555;font-size:.85rem}
.error-msg{color:#ef4444;text-align:center;padding:2rem;font-size:.9rem}

/* Header */
.page-header{text-align:center;padding:2rem 1rem 1rem;border-bottom:1px solid #1a1a1a}
.page-header h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-header .subtitle{color:#666;font-size:.9rem;margin-top:.4rem;line-height:1.4}
.back-link{display:inline-block;margin-top:.7rem;font-size:.8rem;color:#a78bfa;padding:.3rem .8rem;border:1px solid #2a2a5a;border-radius:6px}
.back-link:hover{background:#1a1a3a;text-decoration:none}

/* Stats overview */
.stats-overview{display:flex;flex-wrap:wrap;justify-content:center;gap:1rem;padding:1.5rem 1rem;border-bottom:1px solid #1a1a1a}
.stat-card{text-align:center;min-width:80px}
.stat-card .num{font-size:1.4rem;font-weight:900}
.stat-card .lbl{font-size:.75rem;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-top:.15rem}
.stat-card.s-total .num{color:#a78bfa}
.stat-card.s-rated .num{color:#3b82f6}
.stat-card.s-like .num{color:#22c55e}
.stat-card.s-dislike .num{color:#ef4444}
.stat-card.s-mixed .num{color:#f59e0b}
.stat-card.s-engines .num{color:#818cf8}

/* Section headings */
.section{padding:1.5rem 1rem;max-width:900px;margin:0 auto}
.section-title{font-size:1.2rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.section-title::before{content:'';display:inline-block;width:4px;height:1.2em;background:linear-gradient(135deg,#a855f7,#3b82f6);border-radius:2px}

/* Batch timeline */
.batch-card{background:#141414;border-radius:14px;margin-bottom:1.2rem;overflow:hidden;border:1px solid #1e1e1e}
.batch-header{padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem;border-bottom:1px solid #1e1e1e}
.batch-name{font-size:.95rem;font-weight:700}
.batch-date{font-size:.75rem;color:#555}
.batch-thumbs{display:flex;gap:4px;padding:.6rem .8rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.batch-thumb{width:120px;min-width:120px;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:#0a0a0a;position:relative;cursor:pointer}
.batch-thumb img{width:100%;height:100%;object-fit:cover}
.batch-thumb .video-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
.batch-thumb .video-overlay::after{content:'';width:0;height:0;border-style:solid;border-width:12px 0 12px 22px;border-color:transparent transparent transparent rgba(255,255,255,.85)}
.batch-meta{padding:.5rem .8rem .8rem;display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}

/* Badges */
.badge{font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;display:inline-block}
.b-flux{background:#1a1a3a;color:#818cf8;border:1px solid #2a2a5a}
.b-recraft{background:#1a2a1a;color:#4ade80;border:1px solid #2a4a2a}
.b-runway{background:#2a1a2a;color:#f472b6;border:1px solid #4a2a4a}
.b-tron{background:#0a1a2a;color:#22d3ee;border:1px solid #114455}
.b-hunter{background:#1a2a0a;color:#84cc16;border:1px solid #335511}
.b-patriot{background:#1a0a1a;color:#c084fc;border:1px solid #332255}

.rating-summary{display:flex;gap:.5rem;align-items:center;margin-left:auto;flex-wrap:wrap}
.r-badge{font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:4px}
.r-like{background:#0a1a0a;color:#22c55e;border:1px solid #114411}
.r-dislike{background:#1a0a0a;color:#ef4444;border:1px solid #331111}
.r-mixed{background:#1a1a0a;color:#f59e0b;border:1px solid #443311}
.r-unrated{background:#1a1a1a;color:#666;border:1px solid #333}

.tag-pills{padding:0 .8rem .6rem;display:flex;flex-wrap:wrap;gap:.3rem}
.tag-pill{font-size:.6rem;padding:2px 8px;border-radius:12px;background:#1a1a2a;color:#a78bfa;border:1px solid #2a2a4a}

/* Prompt Evolution */
.prompt-evo-card{background:#141414;border-radius:12px;padding:1rem;margin-bottom:1rem;border:1px solid #1e1e1e}
.prompt-evo-card .batch-label{font-size:.75rem;color:#a78bfa;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.prompt-evo-card .prompt-text{font-size:.8rem;color:#999;line-height:1.6;font-style:italic}
.prompt-evo-card .prompt-text .highlight{color:#a855f7;font-weight:600;font-style:normal;background:rgba(168,85,247,.1);padding:1px 4px;border-radius:3px}
.prompt-arrow{text-align:center;color:#333;font-size:1.2rem;margin:.3rem 0}

/* Feedback Insights */
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.insights-grid{grid-template-columns:1fr}}
.insight-card{background:#141414;border-radius:12px;padding:1rem;border:1px solid #1e1e1e}
.insight-card h4{font-size:.85rem;font-weight:700;margin-bottom:.6rem}
.insight-card h4.positive{color:#22c55e}
.insight-card h4.negative{color:#ef4444}
.insight-card h4.engines{color:#818cf8}
.insight-card h4.shots{color:#f59e0b}
.insight-item{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid #1a1a1a}
.insight-item:last-child{border-bottom:none}
.insight-item .name{font-size:.8rem;color:#ccc}
.insight-item .value{font-size:.8rem;font-weight:700}
.insight-bar{height:6px;background:#1a1a1a;border-radius:3px;margin-top:.25rem;overflow:hidden}
.insight-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.insight-bar-fill.green{background:linear-gradient(90deg,#22c55e,#4ade80)}
.insight-bar-fill.red{background:linear-gradient(90deg,#ef4444,#f87171)}
.insight-bar-fill.purple{background:linear-gradient(90deg,#a855f7,#c084fc)}
.insight-bar-fill.yellow{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

.no-data{color:#444;font-size:.8rem;padding:.5rem 0}

/* Download */
.download-section{text-align:center;padding:2rem 1rem 3rem}
.download-btn{background:linear-gradient(135deg,#a855f7,#3b82f6);color:#fff;border:none;border-radius:10px;padding:.8rem 2rem;font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .15s}
.download-btn:hover{transform:scale(1.03)}
.download-btn:active{transform:scale(.97)}
.download-btn:disabled{opacity:.4;cursor:default;transform:none}

/* Image modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column;padding:1rem}
.modal-backdrop.open{display:flex}
.modal-backdrop img{max-width:90vw;max-height:70vh;object-fit:contain;border-radius:8px}
.modal-backdrop video{max-width:90vw;max-height:70vh;border-radius:8px}
.modal-info{color:#888;font-size:.8rem;margin-top:.6rem;text-align:center;max-width:90vw}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:#555;font-size:1.6rem;cursor:pointer}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Loading asset data...</p>
</div>

<div id="content" style="display:none">

  <!-- Header -->
  <div class="page-header">
    <h1>CB Creative Lab: Evolution</h1>
    <p class="subtitle">How ratings shape better assets, generation by generation</p>
    <a class="back-link" href="https://jbarad424.github.io/ideas/asset-tagger.html">Back to Lab</a>
  </div>

  <!-- Stats overview -->
  <div class="stats-overview" id="statsOverview"></div>

  <!-- Batch timeline -->
  <div class="section" id="batchSection">
    <div class="section-title">Batch Timeline</div>
    <div id="batchTimeline"></div>
  </div>

  <!-- Prompt Evolution -->
  <div class="section" id="promptSection">
    <div class="section-title">Prompt Evolution</div>
    <p style="font-size:.8rem;color:#555;margin-bottom:1rem;line-height:1.5">See how prompts were refined based on feedback across generations.</p>
    <div id="promptEvolution"></div>
  </div>

  <!-- Feedback Insights -->
  <div class="section" id="insightSection">
    <div class="section-title">Feedback Insights</div>
    <div class="insights-grid" id="insightsGrid"></div>
  </div>

  <!-- Download -->
  <div class="download-section">
    <button class="download-btn" id="downloadBtn" onclick="downloadCSV()">Download Rating Data (CSV)</button>
  </div>
</div>

<!-- Image modal -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <button class="modal-close" onclick="closeModal()">&times;</button>
  <div id="modalContent"></div>
  <div class="modal-info" id="modalInfo"></div>
</div>

<script>
const DATA_URL = 'https://jbarad424.github.io/ideas/cb-ai-lab.json';
let allImages = [];

async function init() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error('Failed to load data: ' + res.status);
    const data = await res.json();
    allImages = data.images || [];
    render();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div class="error-msg">Failed to load data. ' + escHtml(e.message) + '</div>';
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  renderStats();
  renderBatchTimeline();
  renderPromptEvolution();
  renderInsights();

  if (!allImages.some(i => i.rating)) {
    document.getElementById('downloadBtn').disabled = true;
  }
}

/* === STATS === */
function renderStats() {
  const total = allImages.length;
  const rated = allImages.filter(i => i.rating).length;
  const likes = allImages.filter(i => i.rating === 'like').length;
  const dislikes = allImages.filter(i => i.rating === 'dislike').length;
  const mixed = allImages.filter(i => i.rating === 'mixed').length;
  const engines = [...new Set(allImages.map(i => (i.model || '').toLowerCase()).filter(Boolean))];

  const stats = [
    { cls: 's-total', num: total, lbl: 'Total Assets' },
    { cls: 's-rated', num: rated, lbl: 'Rated' },
    { cls: 's-like', num: likes, lbl: 'Liked' },
    { cls: 's-dislike', num: dislikes, lbl: 'Disliked' },
    { cls: 's-mixed', num: mixed, lbl: 'Mixed' },
    { cls: 's-engines', num: engines.length, lbl: 'Engines' },
  ];

  document.getElementById('statsOverview').innerHTML = stats.map(s =>
    '<div class="stat-card ' + s.cls + '"><div class="num">' + s.num + '</div><div class="lbl">' + s.lbl + '</div></div>'
  ).join('');
}

/* === BATCH TIMELINE === */
function getBatches() {
  const map = {};
  allImages.forEach(img => {
    const bid = img.batchId || 'unknown';
    if (!map[bid]) map[bid] = [];
    map[bid].push(img);
  });

  return Object.entries(map).map(([id, imgs]) => {
    const dates = imgs.map(i => i.generatedAt).filter(Boolean).sort();
    return {
      id,
      images: imgs,
      earliestDate: dates[0] || null,
      latestDate: dates[dates.length - 1] || null,
    };
  }).sort((a, b) => {
    if (!a.earliestDate && !b.earliestDate) return 0;
    if (!a.earliestDate) return 1;
    if (!b.earliestDate) return -1;
    return new Date(a.earliestDate) - new Date(b.earliestDate);
  });
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return ''; }
}

function modelBadgeClass(model) {
  const m = (model || '').toLowerCase();
  if (m.includes('flux')) return 'b-flux';
  if (m.includes('recraft')) return 'b-recraft';
  if (m.includes('runway')) return 'b-runway';
  return 'b-flux';
}

function modelBadgeLabel(model) {
  const m = (model || '').toLowerCase();
  if (m.includes('flux')) return 'FLUX';
  if (m.includes('recraft')) return 'Recraft';
  if (m.includes('runway')) return 'Runway';
  return model || 'Unknown';
}

function isVideo(img) {
  return (img.model || '').toLowerCase() === 'runway';
}

function thumbUrl(img) {
  if (isVideo(img)) return '';
  if (!img.driveFileId) return '';
  return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(img.driveFileId) + '&sz=w400';
}

function renderBatchTimeline() {
  const batches = getBatches();
  if (batches.length === 0) {
    document.getElementById('batchTimeline').innerHTML = '<div class="no-data">No batches found.</div>';
    return;
  }

  document.getElementById('batchTimeline').innerHTML = batches.map((batch, bi) => {
    const thumbImgs = batch.images.slice(0, 6);
    const models = [...new Set(batch.images.map(i => i.model).filter(Boolean))];
    const rated = batch.images.filter(i => i.rating);
    const likes = rated.filter(i => i.rating === 'like').length;
    const dislikes = rated.filter(i => i.rating === 'dislike').length;
    const mixed = rated.filter(i => i.rating === 'mixed').length;
    const unrated = batch.images.length - rated.length;

    // Collect feedback tags from rated images in this batch
    const tagCounts = {};
    batch.images.forEach(img => {
      if (img.feedbackTags && Array.isArray(img.feedbackTags)) {
        img.feedbackTags.forEach(t => {
          tagCounts[t] = (tagCounts[t] || 0) + 1;
        });
      }
    });
    const topTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);

    return '<div class="batch-card">' +
      '<div class="batch-header">' +
        '<div><span class="batch-name">Batch ' + escHtml(batch.id) + '</span>' +
        ' <span class="batch-date">' + escHtml(formatDate(batch.earliestDate)) + '</span>' +
        ' <span style="font-size:.7rem;color:#444">(' + batch.images.length + ' assets)</span></div>' +
        '<div class="rating-summary">' +
          (likes > 0 ? '<span class="r-badge r-like">' + likes + ' liked</span>' : '') +
          (dislikes > 0 ? '<span class="r-badge r-dislike">' + dislikes + ' disliked</span>' : '') +
          (mixed > 0 ? '<span class="r-badge r-mixed">' + mixed + ' mixed</span>' : '') +
          (unrated > 0 ? '<span class="r-badge r-unrated">' + unrated + ' unrated</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="batch-thumbs">' +
        thumbImgs.map(img => {
          if (isVideo(img)) {
            return '<div class="batch-thumb" onclick="openModal(\'' + escAttr(img.driveFileId || '') + '\',\'video\',\'' + escAttr(img.prompt || '') + '\')">' +
              '<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center">' +
                '<div class="video-overlay" style="position:static;background:transparent"></div>' +
              '</div>' +
            '</div>';
          }
          const url = thumbUrl(img);
          if (!url) return '';
          return '<div class="batch-thumb" onclick="openModal(\'' + escAttr(url.replace('w400','w800')) + '\',\'image\',\'' + escAttr(img.prompt || '') + '\')">' +
            '<img src="' + escAttr(url) + '" alt="" loading="lazy">' +
          '</div>';
        }).join('') +
      '</div>' +
      '<div class="batch-meta">' +
        models.map(m => '<span class="badge ' + modelBadgeClass(m) + '">' + escHtml(modelBadgeLabel(m)) + '</span>').join('') +
      '</div>' +
      (topTags.length > 0 ? '<div class="tag-pills">' + topTags.map(([t, c]) =>
        '<span class="tag-pill">' + escHtml(t) + (c > 1 ? ' (' + c + ')' : '') + '</span>'
      ).join('') + '</div>' : '') +
    '</div>';
  }).join('');
}

function escAttr(s) {
  return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
}

/* === PROMPT EVOLUTION === */
function renderPromptEvolution() {
  const batches = getBatches();
  const container = document.getElementById('promptEvolution');

  if (batches.length === 0) {
    container.innerHTML = '<div class="no-data">No prompt data available.</div>';
    return;
  }

  // Get a representative prompt per batch (first non-empty unique one)
  const batchPrompts = batches.map(batch => {
    const prompts = [...new Set(batch.images.map(i => i.prompt).filter(Boolean))];
    return {
      id: batch.id,
      date: batch.earliestDate,
      prompts: prompts,
      representative: prompts[0] || '(no prompt recorded)',
      count: prompts.length,
    };
  });

  // Find what changed between consecutive batches
  container.innerHTML = batchPrompts.map((bp, idx) => {
    let promptHtml = escHtml(bp.representative);

    // Highlight new keywords/phrases that appear in later batches but not earlier ones
    if (idx > 0) {
      const prevWords = new Set();
      for (let p = 0; p < idx; p++) {
        batchPrompts[p].representative.toLowerCase().split(/\s+/).forEach(w => prevWords.add(w));
      }
      // Find words in current prompt that are new
      const words = bp.representative.split(/\s+/);
      const highlighted = words.map(w => {
        const clean = w.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (clean.length > 3 && !prevWords.has(clean)) {
          return '<span class="highlight">' + escHtml(w) + '</span>';
        }
        return escHtml(w);
      });
      promptHtml = highlighted.join(' ');
    }

    const arrow = idx < batchPrompts.length - 1 ? '<div class="prompt-arrow">&#8595;</div>' : '';

    return '<div class="prompt-evo-card">' +
      '<div class="batch-label">' +
        '<span>Batch ' + escHtml(bp.id) + '</span>' +
        (bp.date ? '<span style="color:#444;font-weight:400;font-size:.7rem">' + formatDate(bp.date) + '</span>' : '') +
        (bp.count > 1 ? '<span style="color:#444;font-weight:400;font-size:.65rem">(' + bp.count + ' unique prompts)</span>' : '') +
      '</div>' +
      '<div class="prompt-text">' + promptHtml + '</div>' +
    '</div>' + arrow;
  }).join('');
}

/* === FEEDBACK INSIGHTS === */
function renderInsights() {
  const container = document.getElementById('insightsGrid');
  const rated = allImages.filter(i => i.rating);

  if (rated.length === 0) {
    container.innerHTML = '<div class="no-data" style="grid-column:1/-1">No rated assets yet. Rate some assets in the Lab to see insights here.</div>';
    return;
  }

  // Positive tags
  const positiveTags = {};
  const negativeTags = {};
  rated.forEach(img => {
    if (!img.feedbackTags || !Array.isArray(img.feedbackTags)) return;
    img.feedbackTags.forEach(tag => {
      if (img.rating === 'like') {
        positiveTags[tag] = (positiveTags[tag] || 0) + 1;
      } else if (img.rating === 'dislike') {
        negativeTags[tag] = (negativeTags[tag] || 0) + 1;
      } else {
        // mixed: count in both at half weight conceptually, or just both
        positiveTags[tag] = (positiveTags[tag] || 0) + 0.5;
        negativeTags[tag] = (negativeTags[tag] || 0) + 0.5;
      }
    });
  });

  const sortedPositive = Object.entries(positiveTags).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const sortedNegative = Object.entries(negativeTags).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxPosCount = sortedPositive.length > 0 ? sortedPositive[0][1] : 1;
  const maxNegCount = sortedNegative.length > 0 ? sortedNegative[0][1] : 1;

  // Engine performance
  const engineStats = {};
  rated.forEach(img => {
    const m = (img.model || 'unknown').toLowerCase();
    if (!engineStats[m]) engineStats[m] = { likes: 0, dislikes: 0, mixed: 0, total: 0 };
    engineStats[m].total++;
    if (img.rating === 'like') engineStats[m].likes++;
    else if (img.rating === 'dislike') engineStats[m].dislikes++;
    else engineStats[m].mixed++;
  });
  const engineList = Object.entries(engineStats)
    .map(([name, s]) => ({ name, ...s, likeRatio: s.total > 0 ? s.likes / s.total : 0 }))
    .sort((a, b) => b.likeRatio - a.likeRatio);

  // Shot type performance
  const shotStats = {};
  rated.forEach(img => {
    const s = img.shotType || 'unknown';
    if (!shotStats[s]) shotStats[s] = { likes: 0, dislikes: 0, mixed: 0, total: 0 };
    shotStats[s].total++;
    if (img.rating === 'like') shotStats[s].likes++;
    else if (img.rating === 'dislike') shotStats[s].dislikes++;
    else shotStats[s].mixed++;
  });
  const shotList = Object.entries(shotStats)
    .map(([name, s]) => ({ name, ...s, likeRatio: s.total > 0 ? s.likes / s.total : 0 }))
    .sort((a, b) => b.likeRatio - a.likeRatio);

  let html = '';

  // Positive tags card
  html += '<div class="insight-card">';
  html += '<h4 class="positive">Top Positive Tags</h4>';
  if (sortedPositive.length === 0) {
    html += '<div class="no-data">No positive feedback tags yet.</div>';
  } else {
    html += sortedPositive.map(([tag, count]) =>
      '<div class="insight-item"><span class="name">' + escHtml(tag) + '</span><span class="value" style="color:#22c55e">' + Math.round(count) + '</span></div>' +
      '<div class="insight-bar"><div class="insight-bar-fill green" style="width:' + (count / maxPosCount * 100) + '%"></div></div>'
    ).join('');
  }
  html += '</div>';

  // Negative tags card
  html += '<div class="insight-card">';
  html += '<h4 class="negative">Top Negative Tags</h4>';
  if (sortedNegative.length === 0) {
    html += '<div class="no-data">No negative feedback tags yet.</div>';
  } else {
    html += sortedNegative.map(([tag, count]) =>
      '<div class="insight-item"><span class="name">' + escHtml(tag) + '</span><span class="value" style="color:#ef4444">' + Math.round(count) + '</span></div>' +
      '<div class="insight-bar"><div class="insight-bar-fill red" style="width:' + (count / maxNegCount * 100) + '%"></div></div>'
    ).join('');
  }
  html += '</div>';

  // Engine performance card
  html += '<div class="insight-card">';
  html += '<h4 class="engines">Engine Performance</h4>';
  if (engineList.length === 0) {
    html += '<div class="no-data">No engine data available.</div>';
  } else {
    html += engineList.map(e =>
      '<div class="insight-item"><span class="name">' + escHtml(modelBadgeLabel(e.name)) + '</span>' +
      '<span class="value" style="color:#818cf8">' + Math.round(e.likeRatio * 100) + '% liked</span></div>' +
      '<div class="insight-bar"><div class="insight-bar-fill purple" style="width:' + (e.likeRatio * 100) + '%"></div></div>' +
      '<div style="font-size:.65rem;color:#444;margin-bottom:.3rem">' + e.likes + ' liked / ' + e.dislikes + ' disliked / ' + e.mixed + ' mixed (of ' + e.total + ')</div>'
    ).join('');
  }
  html += '</div>';

  // Shot type performance card
  html += '<div class="insight-card">';
  html += '<h4 class="shots">Shot Type Performance</h4>';
  if (shotList.length === 0) {
    html += '<div class="no-data">No shot type data available.</div>';
  } else {
    html += shotList.map(s =>
      '<div class="insight-item"><span class="name">' + escHtml(s.name) + '</span>' +
      '<span class="value" style="color:#f59e0b">' + Math.round(s.likeRatio * 100) + '% liked</span></div>' +
      '<div class="insight-bar"><div class="insight-bar-fill yellow" style="width:' + (s.likeRatio * 100) + '%"></div></div>' +
      '<div style="font-size:.65rem;color:#444;margin-bottom:.3rem">' + s.likes + ' liked / ' + s.dislikes + ' disliked / ' + s.mixed + ' mixed (of ' + s.total + ')</div>'
    ).join('');
  }
  html += '</div>';

  container.innerHTML = html;
}

/* === CSV DOWNLOAD === */
function downloadCSV() {
  const rated = allImages.filter(i => i.rating);
  if (rated.length === 0) return;

  const headers = ['imageId', 'batchId', 'model', 'shotType', 'style', 'rating', 'feedbackTags', 'feedbackText', 'ratedAt', 'generatedAt', 'prompt'];
  const rows = rated.map(img => {
    return headers.map(h => {
      let val = img[h];
      if (h === 'feedbackTags' && Array.isArray(val)) val = val.join('; ');
      if (val === null || val === undefined) val = '';
      val = String(val).replace(/"/g, '""');
      if (val.includes(',') || val.includes('"') || val.includes('\n')) val = '"' + val + '"';
      return val;
    }).join(',');
  });

  const csv = headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cb-creative-lab-ratings.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* === MODAL === */
function openModal(src, type, prompt) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  const info = document.getElementById('modalInfo');

  if (type === 'video' && src) {
    content.innerHTML = '<video src="' + escAttr(src) + '" controls autoplay style="max-width:90vw;max-height:70vh;border-radius:8px"></video>';
  } else if (type === 'image' && src) {
    content.innerHTML = '<img src="' + escAttr(src) + '" alt="" style="max-width:90vw;max-height:70vh;object-fit:contain;border-radius:8px">';
  } else {
    return;
  }

  info.textContent = prompt || '';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalContent').innerHTML = '';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* === INIT === */
init();
